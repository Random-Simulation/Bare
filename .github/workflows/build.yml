name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb1 libxkbcommon-x11-0 libgtk-3-0 \
            libdrm2 libgbm1 libasound2 libxss1 \
            libnss3 libxcomposite1 libxdamage1 libxrandr2 \
            fonts-liberation libappindicator3-1 \
            xz-utils icnsutils graphicsmagick

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        if: runner.os == 'Windows'
        run: npm run build:win

      - name: Build macOS
        if: runner.os == 'macOS'
        run: npm run build:mac

      - name: Build Linux
        if: runner.os == 'Linux'
        run: npm run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: builds-${{ matrix.os }}
          path: dist/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases

      - name: Create GitHub Release & Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME:-latest}"
          gh release create "$tag" \
            --generate-notes \
            --title "Release $tag" \
            releases/**/*
